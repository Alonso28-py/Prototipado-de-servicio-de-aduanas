<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGAI - Paso Pehuenche | Versión Final</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        /* Ocultar barra de desplazamiento para un look más limpio */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-[url('https://images.unsplash.com/photo-1620216719864-4284144360e2?q=80&w=2000&auto=format&fit=crop')] bg-cover bg-center bg-no-repeat bg-fixed min-h-screen flex items-center justify-center p-4 relative">

    <div class="absolute inset-0 bg-blue-950/70 backdrop-blur-[3px]"></div>

    <!-- ========================================== -->
    <!-- VISTA 1: FORMULARIO PRINCIPAL (TURISTA)    -->
    <!-- ========================================== -->
    <div id="vistaFormulario" class="glass-card relative z-10 rounded-[2rem] shadow-2xl max-w-4xl w-full flex flex-col md:flex-row overflow-hidden border border-white/40 transition-all duration-500">
        
        <!-- Branding Lateral -->
        <div class="bg-gradient-to-br from-blue-800 to-indigo-950 p-10 md:w-2/5 flex flex-col justify-center items-center text-center text-white relative overflow-hidden">
            <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-white/10 blur-2xl"></div>
            <svg class="w-20 h-20 mb-6 drop-shadow-lg opacity-90 text-blue-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            <h2 class="text-3xl font-bold mb-2 tracking-tight">Paso Pehuenche</h2>
            <p class="text-blue-100 text-sm font-medium leading-relaxed">Sistema de Control Aduanero Inteligente</p>
            <div class="mt-8 px-5 py-2 bg-emerald-500/20 rounded-full border border-emerald-400/30 text-emerald-300 text-xs font-bold tracking-widest backdrop-blur-md flex items-center">
                <div class="w-2 h-2 bg-emerald-400 rounded-full mr-2 animate-pulse"></div> SERVIDOR ACTIVO
            </div>
        </div>

        <!-- Formulario -->
        <div class="p-8 md:p-10 md:w-3/5 bg-white/90 relative">
            <h3 class="text-2xl font-extrabold text-slate-800 mb-6">Declaración de Salida</h3>

            <form id="formularioAduana" class="space-y-5" onsubmit="event.preventDefault(); procesarTramiteEstricto();">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <!-- Campo RUT -->
                    <div class="relative">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">RUT Conductor</label>
                        <input type="text" id="rut" placeholder="12345678-9" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-600 outline-none transition-all font-medium">
                    </div>

                    <!-- Campo Patente -->
                    <div class="relative">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Patente Vehículo</label>
                        <input type="text" id="patente" placeholder="ABCD12" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-600 outline-none transition-all font-bold uppercase tracking-wider">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <!-- Pasajeros -->
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Total Ocupantes</label>
                        <select id="pasajeros" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-600 outline-none transition-all font-medium bg-white">
                            <option value="">Seleccione...</option>
                            <option value="1">1 Persona (Solo conductor)</option>
                            <option value="2">2 Personas</option>
                            <option value="3">3 Personas</option>
                            <option value="4">4 Personas</option>
                            <option value="5">5 Personas o más</option>
                        </select>
                    </div>

                    <!-- Menores de Edad -->
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">¿Viajan Menores?</label>
                        <select id="menores" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-600 outline-none transition-all font-medium bg-white">
                            <option value="">Seleccione...</option>
                            <option value="NO">No, solo adultos</option>
                            <option value="SI">Sí, viajan menores</option>
                        </select>
                    </div>
                </div>

                <!-- Botón -->
                <button type="submit" id="btnGenerar" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 px-4 rounded-xl transition-all duration-200 mt-2 shadow-lg hover:shadow-xl flex justify-center items-center group">
                    <span>Generar Pase Aduanero Seguro</span>
                    <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </button>
            </form>

            <!-- Mensaje de Error -->
            <div id="mensajeError" class="hidden mt-4 p-4 bg-red-50 border-l-4 border-red-600 rounded-r-xl text-red-700 text-sm font-semibold flex items-center shadow-sm">
                <svg class="w-6 h-6 mr-3 flex-shrink-0 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span id="textoError"></span>
            </div>

            <!-- Contenedor QR (Éxito) -->
            <div id="resultado" class="hidden mt-6 bg-blue-50 border border-blue-200 rounded-2xl overflow-hidden transition-all duration-500 transform scale-95 opacity-0">
                <div class="bg-blue-800 px-4 py-3 flex justify-between items-center text-white">
                    <span class="font-bold flex items-center text-sm"><svg class="w-5 h-5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Pase Aprobado</span>
                    <span class="bg-white/20 text-xs px-2 py-1 rounded backdrop-blur-sm font-bold">VÁLIDO</span>
                </div>
                <div class="p-5 flex items-center justify-between">
                    <div>
                        <p class="text-[10px] text-blue-600 uppercase font-black tracking-widest">Plazo Máximo</p>
                        <p id="textoDias" class="text-4xl font-black text-slate-800 mb-2"></p>
                        <p class="text-xs text-slate-500 font-medium max-w-[150px]">Escanee el QR en la caseta fronteriza.</p>
                        
                        <!-- NUEVO BOTÓN DE SIMULACIÓN -->
                        <button id="btnSimularEscaneo" type="button" class="mt-4 text-xs bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg font-bold transition-all shadow-md flex items-center group">
                            <svg class="w-4 h-4 mr-1.5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            Simular Escaneo (Demo)
                        </button>
                    </div>
                    <div class="bg-white p-2 rounded-xl shadow-md border border-slate-200">
                        <div id="qrcode"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- VISTA 2: PANTALLA INSPECTOR (TRAS ESCANEO) -->
    <!-- ========================================== -->
    <div id="vistaInspector" class="hidden relative z-10 w-full max-w-md mx-auto">
        <div class="bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-slate-200">
            <!-- Cabecera Inspector -->
            <div class="bg-emerald-600 p-6 text-center text-white relative">
                <div class="w-16 h-16 bg-white rounded-full mx-auto flex items-center justify-center shadow-lg mb-4">
                    <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-2xl font-black tracking-tight">Pase Validado</h2>
                <p class="text-emerald-100 text-sm font-medium">Control Fronterizo Pehuenche</p>
            </div>
            
            <!-- Datos Dinámicos -->
            <div class="p-8 space-y-6 bg-slate-50">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center">
                    <div><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Patente Autorizada</p><p id="inspPatente" class="text-2xl font-black text-slate-800"></p></div>
                    <div class="text-right"><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Vigencia</p><p id="inspDias" class="text-2xl font-black text-emerald-600"></p></div>
                </div>

                <div class="space-y-3">
                    <div class="flex justify-between items-center border-b border-slate-200 pb-2">
                        <span class="text-sm font-bold text-slate-500">RUT Titular</span>
                        <span id="inspRut" class="text-sm font-bold text-slate-800"></span>
                    </div>
                    <div class="flex justify-between items-center border-b border-slate-200 pb-2">
                        <span class="text-sm font-bold text-slate-500">Total Pasajeros</span>
                        <span id="inspPasajeros" class="text-sm font-bold text-slate-800 bg-slate-200 px-2 py-0.5 rounded"></span>
                    </div>
                    <div class="flex justify-between items-center pb-2">
                        <span class="text-sm font-bold text-slate-500">¿Menores de Edad?</span>
                        <span id="inspMenores" class="text-sm font-bold px-2 py-0.5 rounded"></span>
                    </div>
                </div>

                <button onclick="window.location.href=window.location.pathname" class="w-full mt-4 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl transition-colors">
                    Nuevo Control
                </button>
            </div>
        </div>
    </div>

    <script>
        // === 1. LÓGICA DE ENRUTAMIENTO (Detectar si se escaneó el QR) ===
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            // Si la URL tiene el parámetro 'qr_view', ocultamos el formulario y mostramos el pase
            if (urlParams.get('qr_view') === 'true') {
                document.getElementById('vistaFormulario').classList.add('hidden');
                document.getElementById('vistaInspector').classList.remove('hidden');
                
                // Llenar los datos extraídos de la URL
                document.getElementById('inspPatente').innerText = urlParams.get('patente');
                document.getElementById('inspDias').innerText = urlParams.get('dias') + " DÍAS";
                document.getElementById('inspRut').innerText = urlParams.get('rut');
                document.getElementById('inspPasajeros').innerText = urlParams.get('pas') + " Personas";
                
                const menores = urlParams.get('men');
                const badgeMenores = document.getElementById('inspMenores');
                badgeMenores.innerText = menores;
                if(menores === 'SI') {
                    badgeMenores.classList.add('bg-amber-100', 'text-amber-700');
                } else {
                    badgeMenores.classList.add('bg-slate-200', 'text-slate-600');
                }
            }
        };

        // === 2. ALGORITMO DE VALIDACIÓN DE RUT CHILENO ===
        function validarRutChileno(rutCompleto) {
            if (!/^[0-9]+[-|‐]{1}[0-9kK]{1}$/.test(rutCompleto)) return false;
            let tmp = rutCompleto.split('-');
            let digv = tmp[1]; 
            let rut = tmp[0];
            if (digv == 'K') digv = 'k';
            return (calcularDigitoVerificador(rut) == digv);
        }

        function calcularDigitoVerificador(T) {
            let M = 0, S = 1;
            for (; T; T = Math.floor(T / 10))
                S = (S + T % 10 * (9 - M++ % 6)) % 11;
            return S ? S - 1 : 'k';
        }

        // === 3. PROCESAMIENTO ESTRICTO DEL TRÁMITE ===
        function procesarTramiteEstricto() {
            // Referencias UI
            const btn = document.getElementById('btnGenerar');
            const resultado = document.getElementById('resultado');
            const msjError = document.getElementById('mensajeError');
            const qrContainer = document.getElementById('qrcode');
            
            // Ocultar estados previos
            resultado.classList.add('hidden', 'scale-95', 'opacity-0');
            msjError.classList.add('hidden');
            qrContainer.innerHTML = ''; 

            // Capturar Valores
            const rut = document.getElementById('rut').value.trim();
            const patente = document.getElementById('patente').value.trim().toUpperCase();
            const pasajeros = document.getElementById('pasajeros').value;
            const menores = document.getElementById('menores').value;

            // --- REGLAS DE VALIDACIÓN INFALIBLES ---

            // A) Verificar si falta ALGÚN dato (Ninguna casilla vacía)
            if (!rut || !patente || !pasajeros || !menores) {
                mostrarError('Faltan datos. Debe completar todas las casillas del formulario.');
                return;
            }

            // B) Validación Matemática del RUT (Si falta un número o es inventado, falla)
            const rutFormateado = rut.includes('-') ? rut : rut.slice(0, -1) + '-' + rut.slice(-1);
            if (!validarRutChileno(rutFormateado)) {
                mostrarError('El RUT ingresado no existe o es inválido. Verifique los dígitos.');
                return;
            }

            // C) Validación de Patente (Formato chileno/Mercosur o Diplomática)
            const patenteLimpia = patente.replace(/[^A-Z0-9]/g, '');
            const esDiplomatica = patenteLimpia.startsWith('CD') || patenteLimpia.startsWith('CC');
            
            if (!esDiplomatica && patenteLimpia.length !== 6) {
                mostrarError('La patente estándar debe contener exactamente 6 caracteres alfanuméricos.');
                return;
            }

            // --- REGLA DE NEGOCIO: CÁLCULO DE DÍAS ---
            const diasOtorgados = esDiplomatica ? 90 : 180;

            // --- ESTADO DE CARGA ---
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = '<svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
            btn.disabled = true;

            // Simular procesamiento del sistema aduanero
            setTimeout(() => {
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
                
                // --- GENERACIÓN DE LA URL DEL CÓDIGO QR ---
                // Extraemos la URL actual sin parámetros para crear el enlace limpio
                const baseUrl = window.location.href.split('?')[0];
                
                // Armamos la URL que abrirá el QR (Pasando toda la info validada)
                const qrUrl = `${baseUrl}?qr_view=true&rut=${encodeURIComponent(rutFormateado)}&patente=${encodeURIComponent(patenteLimpia)}&dias=${diasOtorgados}&pas=${pasajeros}&men=${menores}`;
                
                // Dibujar el QR apuntando a esa URL
                new QRCode(qrContainer, {
                    text: qrUrl,
                    width: 100,
                    height: 100,
                    colorDark : "#1e3a8a", // Azul corporativo
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.L
                });

                // Funcionalidad del nuevo botón de Simulación
                document.getElementById('btnSimularEscaneo').onclick = () => {
                    window.location.href = qrUrl;
                };

                // Mostrar éxito
                document.getElementById('textoDias').innerText = `${diasOtorgados} Días`;
                resultado.classList.remove('hidden');
                setTimeout(() => {
                    resultado.classList.remove('scale-95', 'opacity-0');
                    resultado.classList.add('scale-100', 'opacity-100');
                }, 10);

            }, 1200);
        }

        function mostrarError(mensaje) {
            document.getElementById('textoError').innerText = mensaje;
            document.getElementById('mensajeError').classList.remove('hidden');
        }
    </script>
</body>
</html>
